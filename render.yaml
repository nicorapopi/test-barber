services:
  - type: web
    name: barber-backend
    env: node
    rootDir: barber-server
    buildCommand: "npm install"
    startCommand: "npm start"
    plan: free
    envVars:
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production

databases:
  - name: barber-postgres
    plan: free
